  test-summary:
    name: Test Summary & Badge Generation
    runs-on: ubuntu-latest
    #    needs: [e2e-tests, visual-regression, accessibility-tests]
    needs: [e2e-tests]
    if: always()
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup project
        uses: ./.github/actions/setup

      - name: Download all test artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: '*-test-results*'
          merge-multiple: true
          path: test-artifacts/

      - name: Download E2E results
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: 'e2e-results-*'
          merge-multiple: true
          path: test-artifacts/e2e/

      - name: Generate test summary
        run: |
          echo "# E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check test results
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.e2e-tests.result }}" == "success" ]]; then
            echo "✅ **E2E Tests**: All browsers passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **E2E Tests**: Some tests failed" >> $GITHUB_STEP_SUMMARY
          fi

          # if [[ "${{ needs.visual-regression.result }}" == "success" ]]; then
          #   echo "✅ **Visual Regression**: All tests passed" >> $GITHUB_STEP_SUMMARY
          # else
          #   echo "❌ **Visual Regression**: Visual differences detected" >> $GITHUB_STEP_SUMMARY
          # fi

          # if [[ "${{ needs.accessibility-tests.result }}" == "success" ]]; then
          #   echo "✅ **Accessibility**: All tests passed" >> $GITHUB_STEP_SUMMARY
          # else
          #   echo "❌ **Accessibility**: Accessibility violations found" >> $GITHUB_STEP_SUMMARY
          # fi

      - name: Generate badges
        run: pnpm run badges

      - name: Upload badge data
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: badge-data
          path: badges/
          retention-days: 30

      - name: Cleanup old artifacts
        run: pnpm run artifacts:cleanup
        continue-on-error: true

      - name: Generate artifact management report
        run: pnpm run artifacts report
        continue-on-error: true

      - name: Upload artifact report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: artifact-management-report
          path: test-dashboard/artifact-report.json
          retention-days: 90

  notification:
    name: Test Notifications
    runs-on: ubuntu-latest
    needs: [test-summary]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - id: get-app-token
        name: Get Workflow Access Token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.APPLICATION_ID }}
          permission-contents: read
          permission-pull-requests: write
          private-key: ${{ secrets.APPLICATION_PRIVATE_KEY }}

      - name: Post PR Comment
        env:
          GH_TOKEN: ${{ steps.get-app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          STATUS: ${{ needs.test-summary.result }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          MARKER="<!-- E2E_TEST_NOTIFICATION_v1 -->"
          DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          if [[ "$STATUS" == "success" ]]; then
            BODY="$MARKER

          ✅ **E2E Testing Passed**

          All accessibility, visual, and functional tests passed successfully.

          **Workflow Run**: [#${RUN_NUMBER}](${RUN_URL})
          **Test Date**: $DATE"
          else
            BODY="$MARKER

          ❌ **E2E Testing Failed**

          Some tests failed. Please review the test results and fix any failures before merging.

          **Workflow Run**: [#${RUN_NUMBER}](${RUN_URL})
          **Test Date**: $DATE"
          fi

          COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '[.[] | select(.body | contains("E2E_TEST_NOTIFICATION_v1"))] | last | .id // empty')

          if [[ -n "$COMMENT_ID" ]]; then
            gh api --method PATCH "repos/${REPO}/issues/comments/${COMMENT_ID}" -f body="$BODY"
          else
            gh api --method POST "repos/${REPO}/issues/${PR_NUMBER}/comments" -f body="$BODY"
          fi
