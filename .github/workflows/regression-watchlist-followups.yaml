---
name: Regression Watchlist Follow-ups

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Regression watchlist issue number to process
        required: true

permissions:
  actions: write
  contents: read
  issues: write

jobs:
  create-follow-ups:
    name: Create follow-up issues
    runs-on: ubuntu-latest
    if: >-
      (
        github.event_name == 'workflow_dispatch' &&
        github.event.inputs.issue_number != ''
      ) || (
        github.event_name == 'issues' &&
        startsWith(github.event.issue.title, 'Regression Watchlist')
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup project dependencies
        uses: ./.github/actions/setup
        with:
          install-playwright: 'false'

      - name: Create regression watchlist follow-up issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WATCHLIST_ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number }}
        run: pnpm tsx scripts/create-regression-watchlist-followups.ts
